<header class="navbar">
  <div class="navbar__container">

    <!-- ── GAUCHE : logo + nav desktop ── -->
    <div class="navbar__left">

      <!-- Logo -->
      <a routerLink="/" class="logo" aria-label="BookHub — accueil">
        <div class="logo__icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <span class="logo__text">BookHub</span>
      </a>

      <!-- Nav desktop -->
      <nav class="nav-desktop" aria-label="Navigation principale">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          routerLinkActive="nav-link--active"
          class="nav-link"
        >
          {{ item.label }}
        </a>
      </nav>

    </div>

    <!-- ── DROITE : recherche + profil + burger ── -->
    <div class="navbar__right">

      <!-- Bouton Catalogue -->
      <a routerLink="/catalogue" class="btn-catalogue" aria-label="Parcourir le catalogue">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Catalogue
      </a>

      <!-- Barre de recherche (desktop) -->
      <div class="searchbar">
        <svg class="searchbar__icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="searchbar__input"
          placeholder="Rechercher un livre..."
          (focus)="goToSearch()"
          aria-label="Rechercher un livre"
          readonly
        />
      </div>

      <!-- Menu profil -->
      <div class="profile">

        <button
          class="profile__btn"
          (click)="toggleDropdown()"
          [attr.aria-expanded]="dropdownOpen"
          aria-label="Menu utilisateur"
          aria-haspopup="true"
        >
          <div class="profile__avatar" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="profile__name">{{ userName }}</span>
          <svg
            class="profile__chevron"
            [class.profile__chevron--open]="dropdownOpen"
            width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            aria-hidden="true"
          >
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <div
          class="dropdown"
          *ngIf="dropdownOpen"
          role="menu"
        >
          <div class="dropdown__header">
            <p class="dropdown__name">{{ userName }}</p>
            <p class="dropdown__email">{{ userEmail }}</p>
          </div>

          <a
            routerLink="/profile"
            class="dropdown__item"
            role="menuitem"
            (click)="closeDropdown()"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Mon profil
          </a>

          <button
            class="dropdown__item dropdown__item--logout"
            role="menuitem"
            (click)="logout()"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Déconnexion
          </button>
        </div>

      </div>

      <!-- Burger mobile -->
      <button
        class="burger"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-label="Ouvrir le menu"
      >
        <svg *ngIf="!mobileMenuOpen" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg *ngIf="mobileMenuOpen" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6"  x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- ── Menu mobile ── -->
  <nav
    class="nav-mobile"
    *ngIf="mobileMenuOpen"
    aria-label="Navigation mobile"
  >
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="nav-mobile__link--active"
      class="nav-mobile__link"
      (click)="toggleMobileMenu()"
    >
      {{ item.label }}
    </a>
    <a
      routerLink="/catalogue"
      routerLinkActive="nav-mobile__link--active"
      class="nav-mobile__link nav-mobile__link--catalogue"
      (click)="toggleMobileMenu()"
    >
      Catalogue
    </a>
  </nav>

</header>
